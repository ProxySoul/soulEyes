name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev.$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build universal binary (arm64 + x86_64)
        run: |
          # Build for Apple Silicon
          swiftc -O -whole-module-optimization \
            -target arm64-apple-macosx13.0 \
            -framework Cocoa -framework QuartzCore \
            -o SoulEyes-arm64 SoulEyes.swift

          # Build for Intel
          swiftc -O -whole-module-optimization \
            -target x86_64-apple-macosx13.0 \
            -framework Cocoa -framework QuartzCore \
            -o SoulEyes-x86_64 SoulEyes.swift

          # Combine into universal binary
          lipo -create SoulEyes-arm64 SoulEyes-x86_64 -output SoulEyes
          lipo -info SoulEyes
          ls -lh SoulEyes

      - name: Create .app bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP="SoulEyes.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp SoulEyes "$APP/Contents/MacOS/SoulEyes"

          /usr/libexec/PlistBuddy -c "Clear dict" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string SoulEyes" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string SoulEyes" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.proxysoul.souleyes" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $VERSION" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleExecutable string SoulEyes" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundlePackageType string APPL" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 13.0" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :LSUIElement bool true" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSHighResolutionCapable bool true" "$APP/Contents/Info.plist"

          echo "Bundle created:"
          du -sh "$APP"
          echo "Info.plist:"
          cat "$APP/Contents/Info.plist"

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep --sign - SoulEyes.app
          codesign --verify --verbose SoulEyes.app

      - name: Package .app
        run: |
          ditto -c -k --keepParent SoulEyes.app SoulEyes.app.zip
          ls -lh SoulEyes.app.zip

      - name: Upload artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: SoulEyes-${{ steps.version.outputs.version }}
          path: SoulEyes.app.zip

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: SoulEyes ${{ steps.version.outputs.version }}
          body: |
            ## SoulEyes ${{ steps.version.outputs.version }}

            **Universal binary** — runs natively on both Apple Silicon and Intel Macs.

            ### Install
            1. Download `SoulEyes.app.zip` below
            2. Unzip and drag `SoulEyes.app` to `/Applications`
            3. **First launch:** Right-click the app → "Open" → click "Open" in the dialog
               (macOS blocks unsigned apps on first run — this only happens once)
            4. The eye icon appears in your menu bar

            > **Alternative:** Run `xattr -cr /Applications/SoulEyes.app` in Terminal before opening.

            ### Requirements
            - macOS 13+ (Ventura or later)

            ---
            *Built by [proxysoul.com](https://proxysoul.com) with SoulForge*
          files: SoulEyes.app.zip
          generate_release_notes: true
          draft: false
          prerelease: false
